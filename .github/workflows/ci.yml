name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-14 cmake

    - name: Install tmech (header-only)
      run: |
        git clone https://github.com/petlenz/tmech.git /tmp/tmech
        sudo cp -r /tmp/tmech/include/tmech /usr/local/include/
        cd /tmp/tmech && cmake -B build -DBUILD_TESTS=OFF
        sudo mkdir -p /usr/local/share/tmech/cmake
        sudo cp build/tmechConfig*.cmake /usr/local/share/tmech/cmake/

    - name: Configure
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DNUMSIM_BUILD_TESTS=ON \
          -DNUMSIM_BUILD_EXAMPLES=OFF \
          -DENABLE_PLOTTING=OFF

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Test
      run: cd build && ctest --output-on-failure
