name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-14 cmake

    - name: Install tmech
      run: |
        git clone https://github.com/petlenz/tmech.git /tmp/tmech
        cd /tmp/tmech
        sudo cmake -B build -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_TESTS=OFF
        sudo cmake --install build

    - name: Configure
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DNUMSIM_BUILD_TESTS=ON \
          -DNUMSIM_BUILD_EXAMPLES=OFF \
          -DENABLE_PLOTTING=OFF

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Test
      run: cd build && ctest --output-on-failure
